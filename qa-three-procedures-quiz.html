<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>培训考试 - QA三项管理程序</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, "Microsoft YaHei", sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 30px; }
        h1 { text-align: center; color: #051C2C; margin-bottom: 10px; font-size: 24px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .info-form { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        .info-form label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        .info-form input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 15px; font-size: 14px; }
        .section { margin-bottom: 30px; }
        .section-title { font-size: 18px; color: #051C2C; border-bottom: 2px solid #051C2C; padding-bottom: 8px; margin-bottom: 20px; }
        .question { margin-bottom: 20px; padding: 15px; background: #fafafa; border-radius: 6px; }
        .question-text { font-size: 15px; color: #333; margin-bottom: 12px; line-height: 1.6; }
        .options { padding-left: 10px; }
        .option { margin-bottom: 8px; }
        .option label { cursor: pointer; padding: 8px 12px; border-radius: 4px; display: block; transition: background 0.2s; }
        .option label:hover { background: #e8f4fc; }
        .option input[type="radio"] { margin-right: 8px; }
        .btn-submit { display: block; width: 100%; padding: 15px; background: #051C2C; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; margin-top: 30px; }
        .btn-submit:hover { background: #006BA6; }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
        .result { display: none; }
        .score-card { text-align: center; padding: 30px; background: linear-gradient(135deg, #051C2C, #006BA6); color: white; border-radius: 12px; margin-bottom: 30px; }
        .score-number { font-size: 64px; font-weight: bold; margin: 20px 0; }
        .score-status { font-size: 24px; margin-bottom: 10px; }
        .score-pass { color: #007A53; }
        .score-fail { color: #C62828; }
        .review-section { margin-top: 30px; }
        .review-item { padding: 15px; margin-bottom: 15px; border-radius: 6px; }
        .review-correct { background: #e8f5e9; border-left: 4px solid #007A53; }
        .review-wrong { background: #ffebee; border-left: 4px solid #C62828; }
        .review-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .review-qnum { font-weight: bold; color: #333; }
        .review-icon { font-size: 20px; }
        .review-answer { color: #007A53; font-size: 14px; margin-top: 5px; }
        .review-your { color: #C62828; font-size: 14px; margin-top: 3px; }
        .source-text { background: #fff; padding: 10px; border-radius: 4px; margin-top: 8px; font-size: 13px; color: #666; border: 1px dashed #ccc; }
        .btn-restart { display: block; width: 100%; padding: 15px; background: #007A53; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; margin-top: 20px; }
        .report-card { border: 2px solid #051C2C; border-radius: 12px; padding: 25px; margin-bottom: 20px; background: #fff; }
        .report-header { text-align: center; border-bottom: 2px solid #051C2C; padding-bottom: 15px; margin-bottom: 15px; }
        .report-header h2 { color: #051C2C; font-size: 20px; margin-bottom: 5px; }
        .report-header p { color: #666; font-size: 13px; }
        .report-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .report-info-item { padding: 8px 12px; background: #f8f9fa; border-radius: 4px; }
        .report-info-item .label { font-size: 12px; color: #999; }
        .report-info-item .value { font-size: 15px; color: #333; font-weight: bold; }
        .report-score-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #f8f9fa; border-radius: 8px; margin-bottom: 15px; }
        .report-score-big { font-size: 48px; font-weight: bold; color: #051C2C; }
        .report-pass-badge { padding: 8px 20px; border-radius: 20px; font-size: 16px; font-weight: bold; }
        .report-pass-badge.pass { background: #e8f5e9; color: #007A53; }
        .report-pass-badge.fail { background: #ffebee; color: #C62828; }
        .report-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        .report-table th { background: #051C2C; color: white; padding: 8px; font-size: 13px; text-align: left; }
        .report-table td { padding: 8px; border-bottom: 1px solid #eee; font-size: 13px; }
        .report-table tr:nth-child(even) { background: #fafafa; }
        .report-footer { text-align: center; color: #999; font-size: 12px; border-top: 1px dashed #ddd; padding-top: 10px; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-group button { flex: 1; }
        .btn-report { display: block; width: 100%; padding: 15px; background: #006BA6; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn-report:hover { background: #005082; }
        .hidden { display: none; }
        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; }
            .btn-group, .btn-report, .btn-restart, .review-section { display: none !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="quizPage">
            <h1>📋 培训考试</h1>
            <p class="subtitle">QA三项管理程序 | 总分 92 分 | 及格线 73 分</p>

            <div class="info-form">
                <label>姓名</label>
                <input type="text" id="name" placeholder="请输入姓名">
                <label>部门</label>
                <input type="text" id="department" placeholder="请输入部门">
            </div>

            <form id="quizForm">
                <div class="section">
                    <div class="section-title">一、质量危机事项预防和处理管理程序（SMP-QA-015-03）</div>
                    <div id="section1"></div>
                </div>
                <div class="section">
                    <div class="section-title">二、记录管理程序（SMP-QA-003-12）</div>
                    <div id="section2"></div>
                </div>
                <div class="section">
                    <div class="section-title">三、状态标识管理程序（SMP-QA-005-12）</div>
                    <div id="section3"></div>
                </div>
                <button type="button" class="btn-submit" onclick="submitQuiz()">提交答卷</button>
            </form>
        </div>

        <div id="resultPage" class="result">
            <h1>📊 考试成绩</h1>

            <!-- 成绩单卡片（可截图） -->
            <div id="reportCard" class="report-card">
                <div class="report-header">
                    <h2>📋 培训考试成绩报告</h2>
                    <p>QA三项管理程序 | 总分 92 分 | 及格线 73 分</p>
                </div>
                <div class="report-info">
                    <div class="report-info-item">
                        <div class="label">姓名</div>
                        <div class="value" id="rptName">-</div>
                    </div>
                    <div class="report-info-item">
                        <div class="label">部门</div>
                        <div class="value" id="rptDept">-</div>
                    </div>
                    <div class="report-info-item">
                        <div class="label">考试时间</div>
                        <div class="value" id="rptTime">-</div>
                    </div>
                    <div class="report-info-item">
                        <div class="label">题目数量</div>
                        <div class="value">23 题 × 4分</div>
                    </div>
                </div>
                <div class="report-score-row">
                    <div>
                        <div style="font-size:13px;color:#666;margin-bottom:5px;">考试成绩</div>
                        <div class="report-score-big" id="rptScore">-</div>
                    </div>
                    <div>
                        <div style="font-size:13px;color:#666;margin-bottom:5px;">考试结果</div>
                        <div class="report-pass-badge" id="rptBadge">-</div>
                    </div>
                </div>
                <table class="report-table">
                    <thead>
                        <tr><th>题号</th><th>答案</th><th>正确</th><th>得分</th></tr>
                    </thead>
                    <tbody id="rptTable"></tbody>
                </table>
                <div class="report-footer">
                    <p>本成绩单由系统自动生成，请截图保存</p>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn-report" onclick="window.print()">🖨️ 打印成绩单</button>
                <button class="btn-report" style="background:#007A53;" onclick="toggleReview()">📝 查看逐题解析</button>
            </div>

            <div class="review-section hidden" id="reviewSection"></div>
            <button class="btn-restart" onclick="restartQuiz()">重新答题</button>
        </div>
    </div>

    <script>
        const questions = [
        {
                "text": "质量危机事项预防和处理管理程序适用于以下哪种情况？",
                "options": [

                        "仅生产设备故障",

                ],
                "answer": "B",

        },
        {

        },
        {
                "text": "以下哪项属于Ⅰ级（特别重大）质量危机？",

                "answer": "B",
                "source": "SMP-QA-015-03，定义4.1：Ⅰ级（特别重大质量危机）：公司产品涉及政府、新闻媒体通告上市药品存在严重不良反应，药品监管部门予以警告，甚至责令停止生产销售的；临床使用中被认为产品内在质量问题导致出现严重人身伤害事故（如伤残、死亡）的。"

        {

                "answer": "B",

        {

        const TOTAL = questions.length;
        const PASS_SCORE = 73;

        function renderQuestions() {
            let html1 = '', html2 = '', html3 = '';
            questions.forEach((q, i) => {
                const sectionHtml = `<div class="question">
                    <div class="question-text">${i+1}. ${q.text}</div>
                    <div class="options">
                        ${q.options.map((opt, j) => `<div class="option"><label><input type="radio" name="q${i}" value="${String.fromCharCode(65+j)}"> ${opt}</label></div>`).join('')}
                    </div>
                </div>`;
                if (i < 10) html1 += sectionHtml;
                else if (i < 20) html2 += sectionHtml;
                else html3 += sectionHtml;
            });
            document.getElementById('section1').innerHTML = html1;
            document.getElementById('section2').innerHTML = html2;
            document.getElementById('section3').innerHTML = html3;
        }

        function submitQuiz() {
            const name = document.getElementById('name').value.trim();
            const department = document.getElementById('department').value.trim();
            if (!name || !department) { alert('请先填写姓名和部门！'); return; }

            let score = 0, correct = 0;
            let reviews = [];

            questions.forEach((q, i) => {
                const sel = document.querySelector(`input[name="q${i}"]:checked`);
                const ua = sel ? sel.value : '';
                const ok = ua === q.answer;
                if (ok) { score += 4; correct++; }
                reviews.push({
                    num: i+1,
                    text: q.text,
                    userAnswer: ua || '未作答',
                    correctAnswer: q.answer,
                    isCorrect: ok,
                    source: q.source
                });
            });

            document.getElementById('quizPage').style.display = 'none';
            document.getElementById('resultPage').style.display = 'block';
            const pass = score >= PASS_SCORE;

            // 填充成绩单
            const now = new Date();
            const timeStr = now.getFullYear() + '-' +
                String(now.getMonth()+1).padStart(2,'0') + '-' +
                String(now.getDate()).padStart(2,'0') + ' ' +
                String(now.getHours()).padStart(2,'0') + ':' +
                String(now.getMinutes()).padStart(2,'0');

            document.getElementById('rptName').textContent = name;
            document.getElementById('rptDept').textContent = department;
            document.getElementById('rptTime').textContent = timeStr;
            document.getElementById('rptScore').textContent = score + ' 分';

            const badge = document.getElementById('rptBadge');
            if (pass) {
                badge.textContent = '✅ 通过';
                badge.className = 'report-pass-badge pass';
            } else {
                badge.textContent = '❌ 未通过';
                badge.className = 'report-pass-badge fail';
            }

            // 填充逐题表格
            let tableHtml = '';
            reviews.forEach(r => {
                tableHtml += `<tr>
                    <td>第${r.num}题</td>
                    <td>${r.userAnswer}</td>
                    <td>${r.isCorrect ? '✅' : '❌'}</td>
                    <td>${r.isCorrect ? '4' : '0'}</td>
                </tr>`;
            });
            tableHtml += `<tr style="font-weight:bold;background:#f0f0f0;">
                <td colspan="3">合计</td>
                <td>${score} 分</td>
            </tr>`;
            document.getElementById('rptTable').innerHTML = tableHtml;

            // 逐题解析
            let reviewHtml = '<h2 style="margin-bottom:15px;color:#333;">📝 逐题解析</h2>';
            reviews.forEach(r => {
                reviewHtml += `<div class="review-item ${r.isCorrect ? 'review-correct' : 'review-wrong'}">
                    <div class="review-header">
                        <span class="review-qnum">第 ${r.num} 题</span>
                        <span class="review-icon">${r.isCorrect ? '✅' : '❌'}</span>
                    </div>
                    <div style="margin-bottom:8px;">${r.text}</div>
                    ${!r.isCorrect ? `<div class="review-your">你的答案：${r.userAnswer}</div>` : ''}
                    <div class="review-answer">正确答案：${r.correctAnswer}</div>
                    <div class="source-text">📖 源文件原文：${r.source}</div>
                </div>`;
            });
            document.getElementById('reviewSection').innerHTML = reviewHtml;
        }

        function toggleReview() {
            const el = document.getElementById('reviewSection');
            el.classList.toggle('hidden');
        }

        function restartQuiz() {
            document.getElementById('quizPage').style.display = 'block';
            document.getElementById('resultPage').style.display = 'none';
            document.getElementById('quizForm').reset();
        }

        renderQuestions();
    </script>
