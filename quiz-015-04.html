    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

<body>

question_text": "试验编号 SY171012001 中，001 表示试验类型代码。（判断）", "option_a": "", "option_b": "", "option_c": "", "option_d": "", "correct_answer": "错误", "rationale": "见 6.1.3：001 表示流水号。", "question_type": "judge", "fill_answer": ""}, {"id": 471, "category": "SMP-PM-015-04 试验管理程序", "question_text": "试验申请计划书的编号是____。", "option_a": "", "option_b": "", "option_c": "", "option_d": "", "correct_answer": "APP1-SMP-PM-015", "rationale": "见 7.1 附属资料：试验申请计划书 APP1-SMP-PM-015。", "question_type": "fill", "fill_answer": ""}, {"id": 472, "category": "SMP-PM-015-04 试验管理程序", "question_text": "试验报告书的编号是____。", "option_a": "", "option_b": "", "option_c": "", "option_d": "", "correct_answer": "APP2-SMP-PM-015", "rationale": "见 7.2 附属资料：试验报告书 APP2-SMP-PM-015。", "question_type": "fill", "fill_answer": ""}, {"id": 473, "category": "SMP-PM-015-04 试验管理程序", "question_text": "试验编号采用 SY+____位试验申请日期+____位流水号组成。", "option_a": "", "option_b": "", "option_c": "", "option_d": "", "correct_answer": "6;3", "rationale": "见 6.1.3：试验编号采用 SY+6 位试验申请日期 +3 位流水号组成。", "question_type": "fill", "fill_answer": ""}, {"id": 474, "category": "SMP-PM-015-04 试验管理程序", "question_text": "对试验结果可应用于商业生产的项目，根据《____》（SMP-QA-012）执行。", "option_a": "", "option_b": "", "option_c": "", "option_d": "", "correct_answer": "变更控制管理程序", "rationale": "见 6.4.3：对试验结果可应用于商业生产的项目，根据《变更控制管理程序》（SMP-QA-012）执行。", "question_type": "fill", "fill_answer": ""}, {"id": 475, "category": "SMP-PM-015-04 试验管理程序", "question_text": "SMP-PM-015-04《试验管理程序》的审核间隔是____个月。", "option_a": "", "option_b": "", "option_c": "", "option_d": "", "correct_answer": "36", "rationale": "见文档头部：审核间隔 36 个月。", "question_type": "fill", "fill_answer": ""}];
        let userAnswers = {};
        let score = 0;
        
        function startQuiz() {
            const name = document.getElementById('nameInput').value.trim();
            const dept = document.getElementById('deptInput').value.trim();
            if (!name || !dept) {
                alert('请填写姓名和部门');
                return;
            }
            
            document.getElementById('infoSection').classList.add('hidden');
            document.getElementById('quizSection').classList.remove('hidden');
            
            renderQuestions();
        }
        
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            
            questions.forEach((q, index) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'question';
                qDiv.id = 'question-' + index;
                
                let questionHTML = `<h3>${index + 1}. ${q.question_text}</h3>`;
                
                if (q.question_type === 'choice') {
                    questionHTML += '<div class="options">';
                    const options = [
                        { label: 'A', value: q.option_a },
                        { label: 'B', value: q.option_b },
                        { label: 'C', value: q.option_c },
                        { label: 'D', value: q.option_d }
                    ];
                    options.forEach(opt => {
                        if (opt.value) {
                            questionHTML += `
                                <label>
                                    <input type="radio" name="q${index}" value="${opt.label}" onchange="saveAnswer(${index}, '${opt.label}')">
                                    ${opt.label}. ${opt.value}
                                </label>`;
                        }
                    });
                    questionHTML += '</div>';
                } else if (q.question_type === 'true_false') {
                    questionHTML += `
                        <div class="options">
                            <label><input type="radio" name="q${index}" value="正确" onchange="saveAnswer(${index}, '正确')"> 正确</label>
                            <label><input type="radio" name="q${index}" value="错误" onchange="saveAnswer(${index}, '错误')"> 错误</label>
                        </div>`;
                } else if (q.question_type === 'fill_blank') {
                    questionHTML += `<input type="text" class="fill-answer" id="fill-${index}" placeholder="请输入答案" onchange="saveAnswer(${index}, this.value)">`;
                }
                
                qDiv.innerHTML = questionHTML;
                container.appendChild(qDiv);
            });
            
            document.getElementById('progress').textContent = `共 ${questions.length} 道题`;
        }
        
        function saveAnswer(index, answer) {
            userAnswers[index] = answer;
        }
        
        function submitQuiz() {
            if (Object.keys(userAnswers).length < questions.length) {
                if (!confirm('还有题目未作答，确定要提交吗？')) {
                    return;
                }
            }
            
            // 计算成绩
            let correct = 0;
            const pointPerQuestion = 100 / questions.length;
            
            questions.forEach((q, index) => {
                const userAnswer = userAnswers[index] || '';
                const correctAnswer = q.correct_answer;
                
                if (userAnswer === correctAnswer) {
                    correct++;
                }
            });
            
            score = Math.round(correct * pointPerQuestion);
            
            // 显示结果
            document.getElementById('quizSection').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('hidden');
            
            document.getElementById('scoreDisplay').textContent = score + ' 分';
            
            const passStatus = document.getElementById('passStatus');
            if (score >= 80) {
                passStatus.innerHTML = '<span class="pass">✓ 及格</span>';
            } else {
                passStatus.innerHTML = '<span class="fail">✗ 不及格</span>';
            }
            
            // 显示解析
            const analysisContainer = document.getElementById('analysisContainer');
            analysisContainer.innerHTML = '<h3 style="margin-bottom: 15px;">题目解析</h3>';
            
            questions.forEach((q, index) => {
                const userAnswer = userAnswers[index] || '未作答';
                const correctAnswer = q.correct_answer;
                const isCorrect = userAnswer === correctAnswer;
                
                const div = document.createElement('div');
                div.className = isCorrect ? 'correct' : 'wrong';
                div.innerHTML = `
                    <strong>${index + 1}. ${q.question_text}</strong><br>
                    你的答案：${userAnswer} | 正确答案：${correctAnswer}<br>
                    <em>解析：${q.rationale}</em>
                `;
                analysisContainer.appendChild(div);
            });
            
            // 保存成绩到 Supabase
            saveScoreToSupabase();
        }
        
        function saveScoreToSupabase() {
            const name = document.getElementById('nameInput').value.trim();
            const dept = document.getElementById('deptInput').value.trim();
            const now = new Date();
            const date = now.toISOString().split('T')[0];
            const time = now.toTimeString().split(' ')[0].substring(0, 5);
            
            fetch(f'https://jzpqzsaocaukqjlqhnex.supabase.co/rest/v1/scores', {
                method: 'POST',
                headers: {
                    f'apikey': 'sb_publishable_i5wv5ciQWu9rhxjMdBqZpw_Z9C-Om4E',
                    f'Authorization': 'Bearer sb_publishable_i5wv5ciQWu9rhxjMdBqZpw_Z9C-Om4E',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    name: name,
                    dept: dept,
                    score: score,
                    date: date,
                    time: time
                })
            })
            .then(response => response.json())
            .then(data => {
                console.log('成绩已保存', data);
            })
            .catch(error => {
                console.error('保存成绩失败', error);
            });
        }
    </script>
</body>
